name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Kita matikan cache sementara agar tidak membawa error binding lama
          # cache: 'npm' 

      - name: Install and Build
        run: |
          # 1. Hapus lockfile lama di runner agar tidak bentrok dengan versi Beta sebelumnya
          rm -rf package-lock.json node_modules
          
          # 2. Install ulang secara bersih (Clean Install)
          # Kita gunakan --legacy-peer-deps jika ada konflik versi React 18/19
          npm install --legacy-peer-deps
          
          # 3. Jalankan build
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages