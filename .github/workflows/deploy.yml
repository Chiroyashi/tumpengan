name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build
        run: |
          # Hapus semua jejak konflik versi
          rm -rf node_modules package-lock.json
          
          # Install ulang dengan mengabaikan konflik peer dependencies (React 18 vs 19)
          npm install --legacy-peer-deps
          
          # Jalankan build
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages